<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Exact Calculator</title>
    <style>
        /* --- GENERAL LAYOUT & GRAPHICS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #090d16;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- THE CALCULATOR --- */
        .calc-body {
            background-color: #171b26;
            width: 360px;
            padding: 24px;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- DISPLAY --- */
        .display-container {
            background-color: #0d111a;
            padding: 24px 20px;
            border-radius: 20px;
            margin-bottom: 24px;
            text-align: right;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .history-view {
            color: #4b5563;
            font-size: 1.1rem;
            min-height: 26px;
            word-wrap: break-word;
            margin-bottom: 6px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .main-display {
            color: #ffffff;
            font-size: 2.6rem;
            font-weight: 600;
            overflow-x: auto;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        /* --- BUTTON MATRIX VIA GRID --- */
        .grid-pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 500;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            background-color: #222733;
            color: #f8fafc;
            transition: all 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background-color: #2d3444;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
            opacity: 0.9;
        }

        /* SPECIAL BUTTON OVERRIDES */
        .op-btn {
            background-color: #ff9f0a; /* Premium Orange */
            color: #ffffff;
            font-size: 1.7rem;
            font-weight: 600;
        }
        .op-btn:hover {
            background-color: #f08c00;
        }

        .clear-btn {
            background-color: #ff453a; /* Premium Red */
            color: #ffffff;
            grid-column: span 2;
            font-weight: 600;
        }
        .clear-btn:hover {
            background-color: #e03b30;
        }

        .eq-btn {
            background-color: #30d158; /* Premium Green */
            color: #ffffff;
            grid-column: span 2;
            font-size: 1.7rem;
            font-weight: 600;
        }
        .eq-btn:hover {
            background-color: #24b346;
        }
    </style>
</head>
<body>

    <div class="calc-body">
        <div class="display-container">
            <div class="history-view" id="history"></div>
            <div class="main-display" id="output">0</div>
        </div>

        <div class="grid-pad">
            <button class="clear-btn" onclick="pressClear()">AC</button>
            <button class="op-btn" onclick="pressOp('/')">&divide;</button>
            <button class="op-btn" onclick="pressOp('*')">&times;</button>

            <button onclick="pressNum('7')">7</button>
            <button onclick="pressNum('8')">8</button>
            <button onclick="pressNum('9')">9</button>
            <button class="op-btn" onclick="pressOp('-')">&minus;</button>

            <button onclick="pressNum('4')">4</button>
            <button onclick="pressNum('5')">5</button>
            <button onclick="pressNum('6')">6</button>
            <button class="op-btn" onclick="pressOp('+')">+</button>

            <button onclick="pressNum('1')">1</button>
            <button onclick="pressNum('2')">2</button>
            <button onclick="pressNum('3')">3</button>
            <button class="op-btn" onclick="pressNum('.')">.</button>

            <button style="grid-column: span 2;" onclick="pressNum('0')">0</button>
            <button class="eq-btn" onclick="pressEquals()">=</button>
        </div>
    </div>

    <script>
        const outputEl = document.getElementById('output');
        const historyEl = document.getElementById('history');

        let currentInput = '0';
        let storedValue = null;
        let currentOp = null;
        let shouldResetDisplay = false;

        const SCALE = 10;
        const MULTIPLIER = BigInt(10 ** SCALE);

        function pressNum(digit) {
            if (currentInput === '0' || shouldResetDisplay) {
                currentInput = digit === '.' ? '0.' : digit;
                shouldResetDisplay = false;
            } else {
                if (digit === '.' && currentInput.includes('.')) return; 
                currentInput += digit;
            }
            updateDisplay();
        }

        function pressOp(op) {
            if (currentOp && !shouldResetDisplay) {
                pressEquals();
            }
            storedValue = currentInput;
            currentOp = op;
            historyEl.innerText = `${storedValue} ${op === '*' ? '×' : op === '/' ? '÷' : op}`;
            shouldResetDisplay = true;
        }

        function pressClear() {
            currentInput = '0';
            storedValue = null;
            currentOp = null;
            shouldResetDisplay = false;
            historyEl.innerText = '';
            updateDisplay();
        }

        function pressEquals() {
            if (!currentOp || storedValue === null) return;

            const res = runExactMath(storedValue, currentInput, currentOp);
            historyEl.innerText = '';
            currentInput = res;
            currentOp = null;
            storedValue = null;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function updateDisplay() {
            outputEl.innerText = currentInput;
        }

        function toBigIntFixed(valStr) {
            const [intPart, fracPart = ''] = valStr.split('.');
            let fixedFrac = fracPart.slice(0, SCALE).padEnd(SCALE, '0');
            return BigInt(intPart + fixedFrac);
        }

        function fromBigIntFixed(bigIntVal) {
            const isNegative = bigIntVal < 0n;
            let str = (isNegative ? -bigIntVal : bigIntVal).toString().padStart(SCALE + 1, '0');
            
            let intPart = str.slice(0, str.length - SCALE);
            let fracPart = str.slice(str.length - SCALE).replace(/0+$/, ''); 

            if (isNegative) intPart = '-' + intPart;
            return fracPart ? `${intPart}.${fracPart}` : intPart;
        }

        function runExactMath(val1, val2, op) {
            try {
                const b1 = toBigIntFixed(val1);
                const b2 = toBigIntFixed(val2);
                let bigResult;

                if (op === '+') {
                    bigResult = b1 + b2;
                } else if (op === '-') {
                    bigResult = b1 - b2;
                } else if (op === '*') {
                    bigResult = (b1 * b2) / MULTIPLIER;
                } else if (op === '/') {
                    if (b2 === 0n) return 'Error';
                    bigResult = (b1 * MULTIPLIER) / b2;
                }

                return fromBigIntFixed(bigResult);
            } catch (err) {
                return 'Error';
            }
        }
    </script>
</body>
</html>
